<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter a number"));
        let fact=1
        for(let i=1;i<=n;i++)
        {
            fact*=i;
        }
        document.write(fact+" is the factorial of "+n);
    </script>
</body>
</html>
