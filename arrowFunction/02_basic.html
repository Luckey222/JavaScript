<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <Script>
        let num=parseInt(prompt("Enter a number: "));
        let oddEven=(num)=>
        {
            if(num%2===0)
            {
                document.write(`${num} is even number`)
            }
            else{
                document.write(`${num} is odd number:`)
            }
        }
        oddEven(num)
    </Script>
</body>
</html>
