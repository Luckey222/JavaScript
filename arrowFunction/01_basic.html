<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let area = () =>
    {
     let l = parseFloat(prompt("Enter the length"));
     let b=parseFloat(prompt("Enter the breadth of a room "));
     let area =l*b;
     document.write(`${area} is the area of a room`);
    };
    area();
    </script>
</body>
