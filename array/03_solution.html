<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num=[15,31,8,9,4,6,12,18,17,11,21,25,28];
        let even=0;
        let odd=0;
        for(let i=0;i<num.length;i++)
        {
            if (num[i]%2===0)
            {
                even+=1;
            }
            else
            {
                odd+=1;
            }
        }
        document.write("The number of even element in an array is: "+even+"<br>");
        document.write(odd+" is the number of odd element in an array");

    </script>
</body>
</html>
