<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = [[5,10,15],[20,25,30]];
        for(let i=0;i<arr.length;i++)
        {
            for(let j=0;j<arr[i].length;j++)
            {
                document.write(arr[i][j]+" ");
            }
            document.write("<br>");
        }
    </script>
</body>
</html>
