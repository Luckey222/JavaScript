<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      let fruit=["banana", "apple", "orange", "mango", "grapes", "kiwi", "papaya"];
      count=fruit.length;
      for(let i=0;i<count;i++)
      {
        fruit[i]=fruit[i].toLowerCase();
        if(fruit[i][0]==="a"||fruit[i][0]==="m")
        {
            document.write(fruit[i]+" ");
        }
      }
    </script>
</body>
</html>
