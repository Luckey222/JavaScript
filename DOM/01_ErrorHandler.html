<body>
  <script>
    function test()
{
    try {
    let a = Number(prompt("Enter number"));
        let b = Number(prompt("Enter number"));
            if ( a===""||b==="") 
            {
            throw "Field must not be empty !";
        }
        if (isNaN(a) || isNaN(b)) {
            throw "Not a number!";
        }
       

        alert(a + b);

    } catch (error) {
        document.write("Error: " + error);
    }
}
test();
  </script>
